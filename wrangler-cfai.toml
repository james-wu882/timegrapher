name = "retomb-ai"
main = "worker.js"
compatibility_date = "2024-09-23"

# Required for Cloudflare Workers AI (worker-cfai.js)
# Copy this file to wrangler.toml if using the CF AI backend
[ai]
binding = "AI"

# No secrets needed — AI binding uses your Cloudflare account automatically
# For Gemini worker: wrangler secret put GEMINI_API_KEY
# For Anthropic worker: wrangler secret put ANTHROPIC_API_KEY
